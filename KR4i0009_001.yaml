body:
  text: 後山詩話宋陳師道撰王師圍金陵唐使徐鉉來鉉伐其能欲以口舌解圍謂太祖不文盛稱其主博學多藝有聖人之能使誦其詩曰秋月之篇天下傳誦之其句云云太祖大笑曰寒士語爾吾不道也鉉內不服謂大言無實可窮也巳請上殿驚懼相目太祖曰微時自秦中歸道華下醉卧田間覺而月出有句曰未離海底千山黑才到天中萬國明鉉大驚殿上稱夀孟嘉落帽前世以為勝絶杜子美九日詩云羞將短髮還吹帽笑倩傍人為正冠其文雅曠逹不減昔人謂詩非力學可致正須胸中度世爾望夫石在處有之古今詩人共用一律唯夢得云望來已是幾千嵗只似當年初望時語雖拙而意工黃叔度魯直之弟也以顧況為第一云山頭日日風和雨行人歸來石應語語意皆工江南有望夫石每過其下不風即雨疑況得句處也歐陽永叔不好杜詩蘇子瞻不好司馬史記余每與黃魯直怪嘆以為異事費氏蜀之青城人以才色入蜀宫後主嬖之號花蘂夫人效王建作宫詞百首國亡入備後宫太祖聞之召使陳詩誦其國亡詩云君王城上竪降旗妾在深宫那得知十四萬人齊解甲更無一個是男兒太祖悅蓋蜀兵十四萬而王師數萬爾韓退之南食詩云鱟實如惠文山海經云鱟如惠文惠文秦冠也蠔相粘如山蠔牡蠣也白樂天云笙歌歸院落燈火下樓臺又云歸來未放笙歌散畫㦸門前蠟燭紅非富貴語看人富貴者也楊蟠金山詩云天末樓臺橫北固夜深燈火見揚州王平甫云莊宅牙人語也解量四至吳僧錢塘白塔院詩曰到江吳地盡隔岸越山多余謂分界堠子語也黃魯直云杜之詩法出審言句法出庾信但過之爾杜之詩法韓之文法也詩文各有體韓以文為詩杜以詩為文故不工爾黃魯直謂白樂天笙歌歸院落燈火下樓臺不如杜子美云落花逰絲白日靜鳴鳩乳燕青春深也孟浩然云氣蒸雲夢澤波撼嶽陽城不如九僧云雲間下蔡邑林際春申君也蘇子瞻曰子美之詩退之之文魯公之書皆集大成者也學詩當以子美為師有規矩故可學退之於詩本無解處以才髙而好爾淵明不為詩寫其胸中之妙爾學杜不成不失為工無韓之才與陶之妙而學其詩終為樂天爾退之詩云長安衆富兒盤饌羅羶葷不解文字飲惟能醉紅裙此老有二妓號絳桃柳枝故張文昌云為出二侍女合彈琵琶筝也又為季干志敘當世名貴服金石藥欲生而死者數輩著之石藏之地下豈為一世戒邪而竟以藥死故白傳云退之服硫黃一病竟不痊也荆公詩云力去陳言誇末俗可憐無補費精神而公文體數變莫年詩益苦故知言不可不慎也子美懷薛據云獨當省署開文苑兼泛滄浪學釣翁省署開文苑滄浪憶釣翁據之詩也王摩詰云九天宫殿開閶闔萬國衣冠拜冕旒子美取作五字云閭闔開黃道衣冠拜紫宸而語益工楊大年傀儡詩云鮑老當筵笑郭郎笑他舞袖太郎當若教鮑老當筵舞轉更郎當舞袖長語俚而意切相傳以為笑吳越後王來朝太祖為置宴出內妓彈琵琶王獻詞曰金鳯欲飛遭掣搦情脉脉看即玉樓雲雨隔太祖起拊其背曰誓不殺錢王武人出慶宫色最後庭裕陵得之㑹教坊獻新聲為作詞號瑤臺第一層宋玉為髙唐賦載巫山神遇楚襄王蓋有所諷也而文士多效之者又為傳記以實之而天地百神舉無免者余謂欲界諸天當有配偶其無偶者則無欲者也唐人記后土事以譏武后爾黃詩韓文有意故有工老杜則無工矣然學者先黃後韓不由黃韓而為老杜則失之拙易矣永叔謂為文有三多看多做多商量多也余以古文為三等周為上七國次之漢為下周之文雅七國之文壯偉其失騁漢之文華贍其失緩東漢而下無取焉陳繹批答曾魯公表云爰露乞骸之請黃裳為曾侍讀制曰備員勸講乞骸備員乃表語非詔語也曾魯公謂人曰使布何所道詩欲其好則不能好矣王介甫以工蘇子瞻以新黃魯直以竒而子美之詩竒常工易新陳莫不好也熙寧初有人自常調上書迎合宰相意遂丞御史蘇長公戲之曰有甚意頭求富貴沒些巴鼻使姦邪有甚意頭沒些巴鼻皆俗語也某公用事排斥端士矯飾僞行范蜀公詠僧房假山倐忽平為險分明假奪真蓋刺之也魯直謂荆公之詩暮年方妙然格髙而體下如云似聞青秧底復作龜兆坼乃前人所未道又云扶輿度陽焰窈窕一川花雖前人亦未易道也然學二謝失於巧爾蘇詩始學劉禹錫故多怨刺學不可不慎也晚學太白至其得意則似之矣然失于粗以其得之易也王荆公莫年喜為集句唐人號為四體黃魯直謂正堪一笑爾司馬溫公為定武從事同幕私幸營妓而公諱之嘗㑹僧廬公往迫之使妓踰墻而去度不可隱乃具道公戲之曰年去年來來去忙暫偷間卧老僧牀驚回一覺遊仙夢又逐流鶯過短墻又杭之舉子中老榜第其子以緋褁之客賀之曰應是窮通自有時人生七十古來稀如今始覺為儒貴不著荷衣便著緋夀之醫者老娶少婦或嘲之曰偎他門戶傍他墻年去年來來去忙採得百花成蜜後為他人作嫁衣裳真可笑也熙寧初外學置官師職簡地親多在幕席徐有學官喜誶語同府苦之詠蠅以刺之曰衣服有時遭㸃染杯盤無日不追隨唐人不學杜詩惟唐彥謙與今黃亞夫庶謝師厚景初學之魯直黃之子謝之壻也其于二父猶子美之於審言也然過於出竒不如杜之遇物而竒也三江五湖平漫千里因風石而竒爾謝師厚廢居於鄧王左丞存其妹壻也奉使荆湖枉道過之夜至其家師厚有詩云倒著衣裳迎戶外盡呼兒女拜燈前世稱杜牧南山與秋色氣勢兩相髙為警絶而子美才用一句語益工曰千崖秋氣髙也魯直有癡弟畜漆琴而不御蟲蝨入焉魯直嘲之曰龍池生壁蝨而未有對魯直之兄大臨旦見床下以溺器畜生魚問知其弟也大呼曰我有對矣乃虎子養溪魚也歐陽公謫永陽聞其倅杜彬善琵琶酒間取之杜正色盛氣而謝不能公亦不復强也後杜置酒數行遽起還內微聞絲聲且作且止而漸近久之抱器而出手不絶彈盡莫而罷公喜甚過所望也故公詩云坐中醉客誰最賢杜彬琵琶皮作絃自從彬死世莫傳皮絃世未有也尚書郎張先善著詞有云雲破月來花弄影簾幕捲花影墮輕絮無影世稱誦云張三影王介甫謂雲破月來花弄影不如李冠朦朧淡月雲來去也冠齊人為六州歌頭道劉項事慷慨雄偉劉潛大俠也喜誦之往時青幕之子婦妓也善為詩詞同府以詞挑之妓答曰清詞麗句永叔子瞻曾獨步似恁文章寫得出來當甚强黃詞云斷送一生唯有破除萬事無過蓋韓詩有云斷送一生唯有酒破除萬事無過酒才去一字遂為切對而語益峻又云杯行到手更留殘不道月明人散謂思相離之憂則不得不盡而俗士改為留連遂使兩句相失正如論詩云一方明月可中庭可不如滿也子瞻謂孟浩然之詩韻髙而才短如造內法酒手而無材料爾魯直乞猫詩云秋來鼠輩欺猫死窺瓮翻盤攪夜眠聞道貍奴將數子買魚穿柳聘銜蟬雖滑而可喜千載而下讀者如新龍圖孫學士覺喜論文謂退之淮西碑叙如書銘如詩子瞻謂杜詩韓文顔書左史皆集大成者也少遊謂元和聖德詩於韓文為下與淮西碑如出兩手蓋其少作也王夫人朝載之之母也謂庶子功名貴富有如韓魏公而未有文士也退之作記記其事爾今之記乃論也少遊謂醉翁亭記亦用賦體莊荀皆文士而有學者其說劍成相賦篇與屈騷何異揚子雲之文好竒而卒不能竒也故思苦而詞艱善為文者因事以出竒江河之行順下而已至其觸山赴谷風摶物激然後盡天下之變子雲唯好竒故不能竒也歐陽公謂退之為樊宗師志便似樊文其始出于司馬子長為長卿傳如其文惟其過之故兼之也退之以文為詩子瞻以詩為詞如教坊雷大使之舞雖極天下之工要非本色今代詞手唯秦七黃九爾唐諸人不逮也韓退之上尊號表曰柝朩天街星宿清潤北嶽醫閭神鬼受職曾子賀赦表曰鈎陳太微星緯咸若昆崘㴾澥濤波不驚世莫能輕重之也後當有知之者國初士大夫例能四六然用散語與故事爾楊文公刀筆豪贍體亦多變而不脫唐末與五代之氣又喜用古語以切對為工乃進士賦體爾歐陽少師始以文體為對屬又善叙事不用故事陳言而文益髙次退之云王特進暮年表奏亦工但傷巧爾元祐初起范蜀公於家固辭其表云六十三而致仕固不待年七十九而造朝豈云知禮是時文潞公八十餘一召而來人各有所志也昔之黠者滑稽以玩世曰彭祖八百嵗而死其婦哭之慟其鄰里共解之曰人生八十不可得而翁八百矣尚何尤婦謝曰汝輩自不喻爾八百死矣九百猶在也世以癡為九百謂其精神不足也又曰令新視事而不習吏道召胥魁具道笞十至五十及折杖數令遽止之曰我解矣笞六十為杖十四耶魁笑曰五十尚可六十猶癡邪長公取為偶對曰九百不死六十猶癡唐語曰二十四考中書令謂汾陽王也而無其對或以問平甫平甫應聲曰萬八千戶冠軍侯不唯對偶精切其貴亦相當也范文正公為嶽陽樓記用對語說時景世以為竒尹師魯讀之曰傳竒體爾傳竒唐裴鉶所著小說也柳三變遊東都南北二巷作新樂府骫骳從俗天下詠之遂傳禁中仁宗頗好其詞每對必使侍從歌之再三三變聞之作宫詞號醉蓬萊因內官逹後宫且求其助仁宗聞而覺之自是不復歌其詞矣㑹改京官乃以無行黜之後改名永仕至屯田員外郎寧拙母巧寧朴母華寧粗母弱寧僻母俗詩文皆然魏文帝曰文以意為主以氣為輔以詞為衛子桓不足以及此其能有所傳乎魯直與方䝉書頃洪甥送令嗣二詩風致灑落材思髙秀展讀賞愛恨未識面也然近世少年多不肯治經術及精讀史乃縱以助詩故致逺則泥想逹源自能追琢之必皆離此諸病漫及之爾與洪朋書云龜父所寄詩語益老健甚慰相期之意方君詩如鳯雛出鷇雖未能翔于千仞竟是真鳯爾老杜云長鑱長鑱白朩柄我生托子以為命黃獨無苗山雪盛短衣數挽不掩脛往時儒者不解黃獨義改為黃精學者承之以豫考之蓋黃獨是也本草赭魁注黃獨肉白皮黃巴漢人蒸食之江東謂之土芋余求之江西謂之土卵煮食之類芋魁云余讀周書月令云反舌有聲佞人在側乃解老杜百舌過時如發口君側有讒人之句韋蘇州詩云憐君卧病思新橘試摘才酸亦未黃書後欲題三百顆洞庭須待滿林霜余往以為蓋用右軍帖中贈子黃甘三百者比見右軍一帖云奉橘三百枚霜未降未可多得蘇州蓋取諸此余評李白詩如張樂於洞庭之野無首無尾不主故常非墨工槧人所可擬議吾友黃介讀李杜優劣論曰論文正不當如此余以為知言與潘邠老書曰大受今安在其詩甚有理致語又工也又曰但詠五言覺翰墨之氣如虹猶足貫日爾禮部員外郎裴說寄邊衣詩曰深閨乍冷開香篋玉筯微微溼紅頰一陳霜風殺柳條濃煙半夜成黃葉重重白練明如雪獨下間階轉凄切秪知抱杵搗秋砧不覺髙樓已無月時聞塞雁聲相喚紗窗只有燈相伴幾展齊紈又懶裁離腸恐逐金刀斷細想儀形執牙尺回刀剪破澄江色愁捻金針信手縫惆悵無人試寬窄時時舉手勻殘淚紅箋漫有千行字書中不盡心中事一半殷勤托邊使裴說詩句甚麗零陵總記載說詩一篇尤詼詭也世語云蘇明允不能詩歐陽永叔不能賦曾子開秦少遊詩如詞韓詩如秋懷别元協律南溪始泛皆佳作也鮑照之詩華而不弱陶淵明之詩切於事情但不文耳子厚謂屈氏楚詞如離騷乃效頌其次效雅最後效風右丞蘇州皆學於陶王得其自在眉山長公守徐嘗與客登項氏戲馬臺賦詩云路失玉鈎芳草合林亡白鶴野泉清廣陵亦有戲馬臺其下有路號玉鈎斜唐髙宗東封有鶴一焉乃詔諸州為老氏築宫名以白鶴公蓋誤用而後所取信故不得不辨也裕陵常謂杜子美詩云勳業頻看鏡行藏獨倚樓謂甫之詩皆不逮此吕某公歸老於洛常遊龍門還閽者執筆厯請官稱公題以詩云思山乘興看山回烏帽綸巾入帝臺門吏不須詢姓字也曾三到鳯池來曹南院為秦帥唃氏入興舉國入寇公自出禦之戰於三都谷大敗之唃氏遂衰其幕府獻詩云賢守新成蓋代功臨危方始見英雄三都谷路全師入十萬胡塵一戰空殺氣尚疑橫塞外捷音相繼遍寰中君王看降如綸命旌節前驅馬首紅太祖夜幸後池對新月置酒問當直學士為誰曰盧多遜召使賦詩請韻曰些子兒其詩云太液池邊看月時好風吹動萬年枝誰家玉匣開新鏡露出清光些子兒太祖大喜盡以坐間飲食器賜之韓魏公為陜西安撫開府長安李待制師中過之李有詩名席間使為官妓賈愛卿賦詩云願得貔貅十萬兵犬戎巢穴一時平歸來不用封侯印只問君王乞愛卿某守與客行林下曰柏花十字裂願客對其倅晚食菱方得對云菱角兩頭尖皆俗諺全語也杭妓胡楚龍靚皆有詩名胡云不見當時丁令威年年處處是相思若將此恨同芳草却恐青青有盡時張子野老于杭多為官妓作詞而不及靚靚獻詩云天與羣芳十樣葩獨分顔色不堪誇牡丹芍藥人題遍自分身如鼓子花子野于是為作詞也王岐公詩喜用金玉珠璧以為富貴而其兄謂之至寶丹閩士有好詩者不用陳語常談寫投梅聖俞答書曰子詩誠工但未能以故為新以俗為雅爾蘇公居頴春夜對月王夫人曰春月可喜秋月使人愁耳公謂全未及也遂作詞曰不似秋光只與離人照斷腸老杜云秋月解傷神語簡而益工也余登多景樓南望丹徒有大白鳥飛近青林而得句云白鳥過林分外明謝眺亦云黃鳥度青枝語巧而弱老杜云白鳥去邊明語少而意廣余每還里而每覺老復得句云坐下漸人多而杜云坐深鄉里敬而語益工乃知杜詩無不有也周盤龍以武功為散騎常侍齊武帝戲之曰貂蟬何如兜鍪對曰貂蟬生于兜鍪外大父頴公罷相建節出師太原其詩曰兜鍪却自貂蟬出敢用前言戲武夫李侍制師中以相業自任嘗帥秦以事去其詩曰兜鍪不勝任猶可冠貂蟬東坡居惠廣守月餽酒六壺吏嘗跌而亡之坡以詩謝曰不謂青州六從事翻成烏有一先生王遊平甫之子嘗云今語例襲陳言但能轉移爾世稱秦詞愁如海為新竒不如李國主已云問君能有幾多愁恰似一江春水向東流但以江為海爾後山詩話
