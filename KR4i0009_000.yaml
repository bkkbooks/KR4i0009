body:
  text: 後山詩話詩文評類提要臣等謹按後山詩話一卷舊本題宋陳師道撰師道有後山叢談已著録是書文獻通考作二卷此本一卷疑後人合併也陸遊老學菴筆記深疑後山叢談及此書且謂叢談或其少作此書則必非師道所撰今考其中於蘇軾黃庭堅秦觀俱有不滿之詞殊不類師道語且謂蘇軾詞如教坊雷大使舞極天下之工而終非本色案蔡絛鐵圍山叢談稱雷萬慶宣和中以善舞𨽻教坊軾卒於建中靖國元年六月師道亦卒於是年十一月安能預知宣和中有雷大使借為譬况其出於依託不問可知矣至謂陶潛之詩切於事情而不文謂韓愈元和聖德詩于集中為最下而裴說寄邊衣一首詩格柔靡殆類小詞乃亟稱之尤為未允其以王建望夫石詩為顧况作亦間有舛誤疑南渡後舊稿散佚好事者以意補之耶然其謂詩文寧拙毋巧寧撲毋華寧粗毋弱寧僻毋俗又謂善為文者因事以出竒江河之行順下而已至其觸山赴谷風摶物激然後盡天下之變持論間有可取其解杜甫同谷歌之黃獨百舌詩之讒人解韋應物之新橘三百駁蘇軾戲馬臺詩之玉鉤白鶴亦間有考證流傳既久固不妨存備一家爾乾隆四十二年五月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
  hash: sha256:c4df919bcaf1aaffdedbf99614846b315b027052afd77f8730fa844b8ceaf056
